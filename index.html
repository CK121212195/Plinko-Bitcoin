      padding: 6px 10px;

</head>
<body>

<script>
// ==================== LANGUAGE ====================
const translations = {
  ko: {
    title: "⚡ SATS PLINKO ⚡",
    subtitle: "라이트닝 사츠로 플린코 대박!",
    balance: "BALANCE",
    session: "SESSION WON",
    drop: "드롭하기 ⚡",
    resultReady: "드롭을 기다리고 있습니다...",
    resultWin: "당첨! +",
    resultJackpot: "🎉 1000x 잭팟!!"
  },
  ja: {
    title: "⚡ SATS PLINKO ⚡",
    subtitle: "ライトニングサツで大当たりプラinko！",
    balance: "残高",
    session: "今回の獲得",
    drop: "ドロップ ⚡",
    resultReady: "ドロップを待っています...",
    resultWin: "当たり！ +",
    resultJackpot: "🎉 1000x ジャックポット!!"
  },
  en: {
    title: "⚡ SATS PLINKO ⚡",
    subtitle: "Lightning Sats Plinko Jackpot!",
    balance: "BALANCE",
    session: "SESSION WON",
    drop: "DROP ⚡",
    resultReady: "Waiting for drop...",
    resultWin: "WIN! +",
    resultJackpot: "🎉 1000x JACKPOT!!"
  }
};

let currentLang = "ko";

// ==================== GAME STATE ====================
let balance = 30000;
let sessionWon = 0;
let currentBet = 1000;
let rows = 16;
let riskLevel = "medium";

let leaderboard = [
  {name: "익명플레이어754", sats: 12000},
  {name: "사츠킹", sats: 8500},
  {name: "플린코러", sats: 6200},
  {name: "비트코인러브", sats: 4500},
  {name: "대박러", sats: 3100}
];

// ==================== CANVAS & PHYSICS (簡易だが視覚的に派手) ====================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = 460;
canvas.height = 520;

let pegs = [];
let balls = [];
let particles = [];

class Ball {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = canvas.width / 2 + (Math.random() * 60 - 30);
    this.y = 50;
    this.vx = (Math.random() - 0.5) * 3;
    this.vy = 3.5;
    this.radius = 13;
    this.bet = currentBet;
    this.landed = false;
    this.slot = -1;
  }
}

function createPegs() {
  pegs = [];
  const spacingY = 32;
  const startY = 90;
  for (let r = 0; r < rows; r++) {
    const y = startY + r * spacingY;
    const offset = (r % 2) * 18;
    const count = 11 + (r % 2);
    for (let c = 0; c < count; c++) {
      const x = 50 + offset + c * 36;
      pegs.push({x, y, r: 7});
    }
  }
}

function drawBackground() {
  ctx.fillStyle = '#0a0519';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Neon glow lines
  ctx.strokeStyle = 'rgba(255, 0, 170, 0.15)';
  ctx.lineWidth = 2;
  for (let i = 0; i < 8; i++) {
    ctx.beginPath();
    ctx.moveTo(0, 80 + i*55);
    ctx.lineTo(canvas.width, 80 + i*55);
    ctx.stroke();
  }
}

function drawPegs() {
  for (let p of pegs) {
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#c084fc';
    ctx.fillStyle = '#c084fc';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawSlots() {
  const slotCount = rows + 1;
  const slotW = (canvas.width - 80) / slotCount;
  const multTable = [0.5,1,2,5,10,25,50,100,250,500,1000,500,250,100,50,25,10];

  for (let i = 0; i < slotCount; i++) {
    const x = 40 + i * slotW;
    let mult = multTable[i] || 5;
    if (riskLevel === "low") mult = Math.max(0.5, mult * 0.6);
    if (riskLevel === "high") mult *= 1.3;

    const color = mult >= 500 ? "#ffd700" : mult >= 50 ? "#ff6ec4" : "#00ffff";

    ctx.fillStyle = color;
    ctx.fillRect(x, canvas.height - 78, slotW - 6, 68);

    ctx.fillStyle = "#000";
    ctx.font = "bold 13px 'Press Start 2P'";
    ctx.textAlign = "center";
    ctx.fillText(mult.toFixed(1)+"x", x + slotW/2 - 3, canvas.height - 45);
  }
}

function draw() {
  drawBackground();
  drawPegs();
  drawSlots();

  // Balls
  ctx.shadowBlur = 25;
  for (let ball of balls) {
    ctx.fillStyle = '#ffaa00'; // Bitcoin Orange
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
    ctx.fill();

    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 4;
    ctx.stroke();
  }
  ctx.shadowBlur = 0;

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 7, 7);
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.03;
    if (p.life <= 0) particles.splice(i,1);
  }
  ctx.globalAlpha = 1;
}

function updatePhysics() {
  for (let i = balls.length - 1; i >= 0; i--) {
    const b = balls[i];
    if (b.landed) continue;

    b.vy += 0.22; // gravity
    b.x += b.vx;
    b.y += b.vy;

    // Peg collision (simple bounce)
    for (let p of pegs) {
      const dx = b.x - p.x;
      const dy = b.y - p.y;
      const dist = Math.hypot(dx, dy);
      if (dist < b.radius + p.r && b.vy > 0) {
        b.vx += dx * 0.12 + (Math.random()-0.5)*2.5;
        b.vy = -b.vy * 0.62;
        b.y = p.y - b.radius - 2;
      }
    }

    // Wall bounce
    if (b.x < 35 || b.x > canvas.width - 35) b.vx *= -0.8;

    // Land
    if (b.y > canvas.height - 85) {
      b.landed = true;
      b.y = canvas.height - 85;
      const slotIndex = Math.floor((b.x - 35) / ((canvas.width - 70) / (rows + 1)));
      b.slot = Math.max(0, Math.min(rows, slotIndex));
      handleLanding(b);
    }
  }
}

function gameLoop() {
  updatePhysics();
  draw();
  requestAnimationFrame(gameLoop);
}

// ==================== LANDING LOGIC ====================
function handleLanding(ball) {
  let mult = [0.5,1,2,5,10,25,50,100,250,500,1000,500,250,100,50,25,10][ball.slot] || 5;
  if (riskLevel === "low") mult *= 0.65;
  if (riskLevel === "high") mult *= 1.35;

  const win = Math.floor(ball.bet * mult);

  balance += win;
  sessionWon += win;

  document.getElementById('balance').textContent = Math.floor(balance).toLocaleString();
  document.getElementById('session-won').textContent = Math.floor(sessionWon).toLocaleString();

  let msgEl = document.getElementById('result');

  if (mult >= 300) {
    msgEl.textContent = translations[currentLang].resultJackpot + " " + win.toLocaleString() + " SATS";
    msgEl.className = "result jackpot";
    createBigWinParticles(ball.x, ball.y);
    showShareModal(win, mult);
  } else if (win > ball.bet) {
    msgEl.textContent = translations[currentLang].resultWin + win.toLocaleString() + " SATS";
    msgEl.className = "result win";
  } else {
    msgEl.textContent = "아쉽게... 다시 도전!";
    msgEl.className = "result";
  }

  updateLeaderboard(win);
}

// Big win particles
function createBigWinParticles(x, y) {
  for (let i = 0; i < 80; i++) {
    particles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 14,
      vy: (Math.random() - 0.5) * 14 - 5,
      life: 1.2,
      color: ["#ffd700","#ff6ec4","#00ffff"][Math.floor(Math.random()*3)]
    });
  }
}

// ==================== UI FUNCTIONS ====================
function setBet(amount) {
  currentBet = amount;
  document.querySelectorAll('.bet-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.bet) === amount);
  });
}

function dropBall() {
  if (balance < currentBet) {
    alert("사츠가 부족합니다! Lightning으로 충전하세요 ⚡");
    return;
  }

  balance -= currentBet;
  document.getElementById('balance').textContent = Math.floor(balance).toLocaleString();

  const ball = new Ball();
  balls.push(ball);

  document.getElementById('result').textContent = "⚡ 떨어지는 중...";
  document.getElementById('result').className = "result";
}

function updateSettings() {
  rows = parseInt(document.getElementById('row-select').value);
  riskLevel = document.getElementById('risk-select').value;
  createPegs();
}

function updateLeaderboard(newWin) {
  leaderboard.unshift({
    name: "플레이어" + Math.floor(Math.random()*900 + 100),
    sats: newWin
  });
  leaderboard.sort((a,b) => b.sats - a.sats);
  leaderboard = leaderboard.slice(0,5);

  renderLeaderboard();
}

function renderLeaderboard() {
  const container = document.getElementById('leaderboard');
  let html = '';
  const emojis = ['👑','🥈','🥉','4️⃣','5️⃣'];

  leaderboard.forEach((entry, i) => {
    html += `
      <div class="lb-row">
        <div class="lb-rank">${emojis[i]}</div>
        <div class="lb-name">${entry.name}</div>
        <div class="lb-score">${entry.sats.toLocaleString()} sats</div>
      </div>`;
  });
  container.innerHTML = html;
}

function changeLanguage(lang) {
  currentLang = lang;
  document.getElementById('subtitle').textContent = translations[lang].subtitle;
  document.getElementById('drop-btn').textContent = translations[lang].drop;
  document.getElementById('result').textContent = translations[lang].resultReady;
}

// ==================== SHARE TO X ====================
function showShareModal(winAmount, mult) {
  const modal = document.getElementById('share-modal');
  const textEl = document.getElementById('share-text');

  let shareText = `⚡ SATS PLINKO 대박 터졌다!!\n\n${winAmount.toLocaleString()} SATS (${mult.toFixed(1)}x)\n\n사츠로 플린코 즐기고 있어요! 너도 와서 대박 노려봐 ⚡\nhttps://ck121212195.github.io/Plinko-Bitcoin/`;

  textEl.textContent = shareText;
  modal.style.display = 'flex';
}

function closeShareModal() {
  document.getElementById('share-modal').style.display = 'none';
}

function shareToX() {
  const text = document.getElementById('share-text').textContent;
  const url = "https://ck121212195.github.io/Plinko-Bitcoin/";
  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
  closeShareModal();
}

// ==================== INIT ====================
function init() {
  createPegs();
  renderLeaderboard();

  document.getElementById('balance').textContent = balance.toLocaleString();
  document.getElementById('session-won').textContent = sessionWon.toLocaleString();

  // Demo drop
  setTimeout(() => {
    if (balls.length === 0) {
      const demoBall = new Ball();
      balls.push(demoBall);
    }
  }, 800);

  gameLoop();
}

window.onload = init;
</script>
