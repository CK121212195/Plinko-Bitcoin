<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>⚡ SATS PLINKO ⚡</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #2a0044, #0a001f);
      color: white;
      font-family: 'Press Start 2P', system-ui, sans-serif;
      text-align: center;
      overflow-x: hidden;
    }

    .header {
      background: linear-gradient(90deg, #ff00aa, #aa00ff);
      padding: 18px 10px;
      font-size: 32px;
      letter-spacing: 4px;
      text-shadow: 0 0 20px #ffd700;
      color: white;
    }

    .subtitle {
      font-size: 14px;
      color: #ffd700;
      margin-top: -8px;
    }

    canvas {
      display: block;
      margin: 15px auto;
      border: 8px solid #ff00aa;
      border-radius: 16px;
      box-shadow: 0 0 40px #ff00aa;
      background: #0a001f;
      max-width: 96%;
    }

    .balance-bar {
      background: rgba(0,0,0,0.85);
      border: 4px solid #ffd700;
      border-radius: 12px;
      margin: 12px auto;
      max-width: 460px;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      font-size: 18px;
    }

    .welcome {
      background: linear-gradient(#ffd700, #ffaa00);
      color: #000;
      font-size: 15px;
      padding: 14px;
      border-radius: 12px;
      margin: 12px auto;
      max-width: 460px;
      box-shadow: 0 0 25px #ffd700;
    }

    button {
      font-family: 'Press Start 2P', sans-serif;
      font-size: 20px;
      padding: 18px 40px;
      margin: 15px auto;
      background: linear-gradient(#ffd700, #ffaa00);
      color: black;
      border: none;
      border-radius: 12px;
      box-shadow: 0 6px 0 #b87800;
      cursor: pointer;
    }

    button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #b87800;
    }

    .result {
      margin: 10px auto;
      max-width: 460px;
      font-size: 18px;
      padding: 16px;
      min-height: 60px;
      border-radius: 12px;
      background: rgba(0,0,0,0.7);
    }

    .jackpot { color: #ffd700; text-shadow: 0 0 30px #ffd700; animation: pulse 0.8s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
  </style>
</head>
<body>

<div class="header">
  SATS PLINKO
  <div class="subtitle">LIGHTNING NETWORK JACKPOT</div>
</div>

<div class="balance-bar">
  <div>BALANCE<br><span id="balance" style="color:#00ffff">30000</span></div>
  <div>WON<br><span id="won" style="color:#ffd700">0</span></div>
</div>

<div class="welcome">
  WELCOME BONUS<br>
  <strong style="font-size:22px">20 FREE DROPS</strong>
</div>

<canvas id="canvas" width="460" height="580"></canvas>

<button onclick="dropBall()">DROP BALL ⚡</button>

<div class="result" id="result">PRESS DROP TO START</div>

<script>
// Matter.js
const Engine = Matter.Engine;
const World = Matter.World;
const Bodies = Matter.Bodies;
const Body = Matter.Body;
const Events = Matter.Events;

let engine;
let canvas, ctx;
let balls = [];
let pegs = [];
let currentBet = 1000;
let balance = 30000;
let sessionWon = 0;

function init() {
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');

  engine = Engine.create();
  engine.gravity.y = 1.25;

  createPegs();
  createBottom();

  // メインループ
  function loop() {
    Engine.update(engine, 1000/60);
    render();
    requestAnimationFrame(loop);
  }
  loop();
}

function createPegs() {
  const rows = 16;
  const startY = 90;
  const spacingY = 33;

  for (let r = 0; r < rows; r++) {
    const y = startY + r * spacingY;
    const offset = (r % 2) * 18;
    const cols = 12;

    for (let c = 0; c < cols; c++) {
      const x = 52 + offset + c * 34;
      const peg = Bodies.circle(x, y, 7, {
        isStatic: true,
        render: { fillStyle: '#c084fc' }
      });
      World.add(engine.world, peg);
    }
  }
}

function createBottom() {
  const ground = Bodies.rectangle(canvas.width/2, canvas.height - 40, canvas.width - 60, 30, {
    isStatic: true,
    render: { fillStyle: '#4a32a0' }
  });
  World.add(engine.world, ground);
}

function dropBall() {
  if (balance < currentBet) {
    alert("Not enough SATS! Deposit more via Lightning.");
    return;
  }

  balance -= currentBet;
  document.getElementById('balance').textContent = balance;

  const ball = Bodies.circle(
    canvas.width / 2 + (Math.random() * 70 - 35),
    80,
    13,
    {
      restitution: 0.72,
      frictionAir: 0.01,
      density: 0.8,
      render: { fillStyle: '#ffaa00' }
    }
  );

  Body.setVelocity(ball, {
    x: (Math.random() - 0.5) * 6,
    y: 8
  });

  balls.push(ball);
  World.add(engine.world, ball);

  document.getElementById('result').textContent = "BALL DROPPING...";
}

function render() {
  ctx.fillStyle = '#0a001f';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Pegs
  ctx.fillStyle = '#c084fc';
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#c084fc';
  engine.world.bodies.forEach(body => {
    if (body.isStatic && body.circleRadius) {
      ctx.beginPath();
      ctx.arc(body.position.x, body.position.y, body.circleRadius, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.shadowBlur = 0;

  // Balls
  ctx.shadowBlur = 25;
  ctx.shadowColor = '#ffaa00';
  for (let i = balls.length - 1; i >= 0; i--) {
    const ball = balls[i];
    ctx.fillStyle = '#ffaa00';
    ctx.beginPath();
    ctx.arc(ball.position.x, ball.position.y, 13, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 4;
    ctx.stroke();

    // 底に着いたら処理
    if (ball.position.y > canvas.height - 90) {
      handleLanding(ball, i);
    }
  }
  ctx.shadowBlur = 0;
}

function handleLanding(ball, index) {
  const slot = Math.floor((ball.position.x - 30) / 30);
  let mult = [0.5,1,2,5,10,25,50,100,250,500,1000,500,250,100,50,25,10][slot] || 5;

  const win = Math.floor(currentBet * mult);

  balance += win;
  sessionWon += win;

  document.getElementById('balance').textContent = balance;
  document.getElementById('won').textContent = sessionWon;

  // 画面から削除
  World.remove(engine.world, ball);
  balls.splice(index, 1);

  const resultEl = document.getElementById('result');
  if (mult >= 300) {
    resultEl.innerHTML = `🎉 JACKPOT!<br>+${win.toLocaleString()} SATS (${mult}x)`;
    resultEl.className = "result jackpot";
  } else if (win > currentBet * 4) {
    resultEl.innerHTML = `BIG WIN!<br>+${win.toLocaleString()} SATS`;
    resultEl.className = "result";
  } else if (win > 0) {
    resultEl.textContent = `WIN +${win.toLocaleString()} SATS`;
    resultEl.className = "result";
  } else {
    resultEl.textContent = "BETTER LUCK NEXT TIME";
  }
}

window.onload = init;
</script>
</body>
</html>
