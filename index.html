<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PLINKO — Lightning Sats</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep:#0c0c14; --bg-mid:#13131f; --bg-card:#1a1a2e;
      --orange:#ff6b00; --yellow:#ffc700; --red:#ff2d55; --cyan:#0affee; --green:#4cd964;
      --text:#f0f0f8; --muted:#6e6e8a;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{background:var(--bg-deep);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
    .header{width:100%;max-width:480px;padding:16px 20px 10px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:'Orbitron',monospace;font-weight:900;font-size:22px;letter-spacing:4px}
    .logo span{color:var(--orange)}
    .logo-sub{font-size:9px;font-weight:700;letter-spacing:3px;color:var(--yellow);display:block;margin-top:-1px}
    .ln-badge{background:linear-gradient(135deg,#f7931a,#ffb84d);color:#000;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;padding:5px 10px;border-radius:6px;letter-spacing:1px;display:flex;align-items:center;gap:5px}
    .ln-dot{width:6px;height:6px;background:#000;border-radius:50%;animation:pulse 1.2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.6)}}
    .stats-row{width:100%;max-width:480px;padding:0 16px 12px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .stat-card{background:var(--bg-card);border-radius:10px;padding:10px 12px;border:1px solid rgba(255,255,255,.06);position:relative;overflow:hidden}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
    .stat-card.balance::before{background:var(--cyan)}
    .stat-card.won::before{background:var(--yellow)}
    .stat-card.drops::before{background:var(--orange)}
    .stat-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
    .stat-value{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stat-card.balance .stat-value{color:var(--cyan)}
    .stat-card.won .stat-value{color:var(--yellow)}
    .stat-card.drops .stat-value{color:var(--orange)}
    .bonus-banner{width:calc(100% - 32px);max-width:448px;margin:0 auto 12px;background:linear-gradient(135deg,#f7931a18,#ffb84d0a);border:1px solid #f7931a44;border-radius:10px;padding:10px 16px;display:flex;align-items:center;justify-content:space-between}
    .bonus-left{font-size:12px;font-weight:700;letter-spacing:1px;color:#f7931a;text-transform:uppercase}
    .bonus-sub{font-size:11px;color:var(--muted)}
    .bonus-count{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;color:var(--yellow);line-height:1}
    .game-wrapper{width:calc(100% - 32px);max-width:448px;margin:0 auto 12px;background:var(--bg-mid);border-radius:16px;border:1px solid rgba(255,255,255,.07);overflow:hidden;position:relative}
    canvas{display:block;width:100%;height:auto}
    .toast{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(12,12,20,.95);border-radius:14px;padding:16px 28px;text-align:center;border:2px solid var(--orange);pointer-events:none;transition:transform .2s cubic-bezier(.34,1.56,.64,1);z-index:10}
    .toast.show{transform:translate(-50%,-50%) scale(1)}
    .toast-mult{font-family:'Orbitron',monospace;font-size:32px;font-weight:900;color:var(--yellow)}
    .toast-sats{font-size:16px;font-weight:700;color:var(--cyan);margin-top:4px}
    .controls{width:calc(100% - 32px);max-width:448px;margin:0 auto 12px}
    .mode-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
    .mode-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:12px 10px;color:var(--text);font-family:'Orbitron',monospace;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
    .mode-btn .sub{display:block;font-family:'Rajdhani',sans-serif;font-size:10px;color:var(--muted);font-weight:600;letter-spacing:1px;margin-top:2px}
    .mode-btn.active{background:rgba(255,107,0,.2);border-color:var(--orange);color:var(--yellow);box-shadow:0 0 16px rgba(255,107,0,.3)}
    .mode-btn.auto-on{background:rgba(10,255,238,.15);border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 16px rgba(10,255,238,.25)}
    .bet-section{background:var(--bg-card);border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid rgba(255,255,255,.05)}
    .section-label{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
    .bet-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
    .bet-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:12px 6px;color:var(--text);font-family:'Orbitron',monospace;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
    .bet-btn span{display:block;font-size:9px;color:var(--muted);font-family:'Rajdhani',sans-serif;letter-spacing:1px;margin-top:2px}
    .bet-btn:hover{background:rgba(255,107,0,.15);border-color:var(--orange)}
    .bet-btn.active{background:rgba(255,107,0,.2);border-color:var(--orange);color:var(--yellow);box-shadow:0 0 16px rgba(255,107,0,.3)}
    .play-btn{width:100%;padding:18px;font-family:'Orbitron',monospace;font-size:18px;font-weight:900;letter-spacing:4px;border:none;border-radius:14px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
    .play-btn.manual{background:linear-gradient(135deg,#ff6b00,#ff2d55);color:#fff;box-shadow:0 4px 24px rgba(255,107,0,.4)}
    .play-btn.auto-running{background:linear-gradient(135deg,#0affee,#0080aa);color:#000;box-shadow:0 4px 24px rgba(10,255,238,.35)}
    .play-btn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:left .5s}
    .play-btn:hover::before{left:100%}
    .play-btn:hover{transform:translateY(-2px)}
    .play-btn:active{transform:translateY(1px)}
    .bottom-section{width:calc(100% - 32px);max-width:448px;margin:0 auto 12px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .panel{background:var(--bg-card);border-radius:12px;padding:12px;border:1px solid rgba(255,255,255,.05)}
    .panel-title{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .panel-title::before{content:'';display:inline-block;width:3px;height:12px;border-radius:2px}
    .panel:first-child .panel-title::before{background:var(--cyan)}
    .panel:last-child .panel-title::before{background:var(--yellow)}
    .history-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
    .history-item:last-child{border-bottom:none}
    .hist-mult{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;padding:2px 6px;border-radius:4px}
    .hist-mult.big{background:rgba(255,199,0,.2);color:var(--yellow)}
    .hist-mult.mid{background:rgba(74,205,100,.2);color:var(--green)}
    .hist-mult.low{background:rgba(255,45,85,.2);color:#ff5f7a}
    .hist-sats{font-weight:600;font-size:12px;color:var(--muted)}
    .lb-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
    .lb-item:last-child{border-bottom:none}
    .lb-rank{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;width:20px;color:var(--muted)}
    .lb-rank.gold{color:var(--yellow)}
    .lb-rank.silver{color:#c0c0c0}
    .lb-rank.bronze{color:#cd7f32}
    .lb-name{flex:1;font-weight:600;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lb-sats{font-family:'Orbitron',monospace;font-size:10px;color:var(--yellow);font-weight:700}
    .footer{width:100%;max-width:480px;padding:10px 20px 24px;display:flex;justify-content:center;gap:24px}
    .footer a{color:var(--cyan);text-decoration:none;font-size:12px;font-weight:600;letter-spacing:1px;opacity:.7;transition:opacity .2s}
    .footer a:hover{opacity:1}
    @keyframes jackpot{0%,100%{color:var(--yellow)}33%{color:#ff2d55}66%{color:var(--cyan)}}
    .jackpot-text{animation:jackpot .35s infinite}
    #particle-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;display:none}
  </style>
</head>
<body>
<canvas id="particle-canvas"></canvas>

<div class="header">
  <div class="logo">PLINK<span>O</span><span class="logo-sub">LIGHTNING SATS</span></div>
  <div class="ln-badge"><div class="ln-dot"></div>BTC LN</div>
</div>

<div class="stats-row">
  <div class="stat-card balance"><div class="stat-label">Balance</div><div class="stat-value" id="balance">30,000</div></div>
  <div class="stat-card won"><div class="stat-label">Won</div><div class="stat-value" id="won">0</div></div>
  <div class="stat-card drops"><div class="stat-label">Drops</div><div class="stat-value" id="drop-count">0</div></div>
</div>

<div class="bonus-banner">
  <div><div class="bonus-left">⚡ Welcome Bonus</div><div class="bonus-sub">Free drops included</div></div>
  <div style="text-align:right"><div class="bonus-count" id="free-drops">20</div><div class="bonus-sub">FREE</div></div>
</div>

<div class="game-wrapper">
  <canvas id="canvas" width="448" height="560"></canvas>
  <div class="toast" id="toast">
    <div class="toast-mult" id="toast-mult">0x</div>
    <div class="toast-sats" id="toast-sats">+0 SATS</div>
  </div>
</div>

<div class="controls">
  <div class="mode-row">
    <button class="mode-btn active" id="btn-manual" onclick="setMode('manual')">
      ▶ MANUAL<span class="sub">1 DROP / TAP</span>
    </button>
    <button class="mode-btn" id="btn-auto" onclick="setMode('auto')">
      ⟳ AUTO<span class="sub">CONTINUOUS</span>
    </button>
  </div>

  <div class="bet-section">
    <div class="section-label">Bet per Drop (sats)</div>
    <div class="bet-grid">
      <button class="bet-btn" onclick="setBet(100,this)">100<span>sats</span></button>
      <button class="bet-btn active" onclick="setBet(500,this)">500<span>sats</span></button>
      <button class="bet-btn" onclick="setBet(1000,this)">1K<span>sats</span></button>
      <button class="bet-btn" onclick="setBet(5000,this)">5K<span>sats</span></button>
      <button class="bet-btn" onclick="setBet(10000,this)">10K<span>sats</span></button>
      <button class="bet-btn" onclick="setBet(50000,this)">50K<span>sats</span></button>
    </div>
  </div>

  <button class="play-btn manual" id="play-btn" onclick="handlePlay()">
    ⚡ PLAY
  </button>
</div>

<div class="bottom-section">
  <div class="panel"><div class="panel-title">Recent</div><div id="history-list"></div></div>
  <div class="panel"><div class="panel-title">Top Wins</div><div id="leaderboard"></div></div>
</div>

<div class="footer">
  <a href="https://ck121212195.github.io/LNbits_slot2/">← Slot</a>
  <a href="https://ck121212195.github.io/Bitcoin-Run/">Run →</a>
</div>

<script>
const { Engine, World, Bodies, Body, Events, Runner } = Matter;

const gameCanvas = document.getElementById('canvas');
const ctx = gameCanvas.getContext('2d');
const W = gameCanvas.width;
const H = gameCanvas.height;

// ── LAYOUT CONSTANTS ──────────────────────────────────────────
const ROWS      = 12;
const PEG_R     = 5;        // visual peg radius
const PEG_PHYS  = 4;        // physics peg radius (slightly smaller = easier bounce)
const BALL_R    = 11;       // visual ball radius
const BALL_PHYS = 10;       // physics ball radius
const GAP       = 32;       // horizontal peg spacing
const BOARD_TOP = 55;
const SLOT_H    = 48;
const SLOT_Y    = H - SLOT_H - 6;

// ── HOUSE EDGE TABLE ─────────────────────────────────────────
// 13 slots (ROWS+1), EV ≈ 0.60x → house edge ~40%
// Symmetric. Edges near 0 to bleed balance.
const MULT     = [0.2, 0.2, 0.3, 0.5, 1.0, 2.0, 8.0, 2.0, 1.0, 0.5, 0.3, 0.2, 0.2];
const SLOT_COL = ['#ff2d55','#ff2d55','#ff5522','#ff6b00','#ff9900','#4cd964','#0affee','#4cd964','#ff9900','#ff6b00','#ff5522','#ff2d55','#ff2d55'];

// ── STATE ──────────────────────────────────────────────────────
let balance    = 30000;
let sessionWon = 0;
let totalDrops = 0;
let freeDrops  = 20;
let currentBet = 500;
let mode       = 'manual';
let autoRunning= false;
let autoTimer  = null;
let history    = [];

let engine, runner, world;
let pegs  = [];
let balls = [];

const LB = [
  {name:'BTC KING',   sats:96000},
  {name:'SATOSHI',    sats:48200},
  {name:'HODLR',      sats:31700},
  {name:'LN GOD',     sats:19400},
  {name:'PLINKO ACE', sats:12100},
];

// ── GEOMETRY ──────────────────────────────────────────────────
function getPegPositions() {
  const rows = [];
  const spacingY = (SLOT_Y - 16 - BOARD_TOP) / (ROWS - 1);
  for (let r = 0; r < ROWS; r++) {
    const y    = BOARD_TOP + r * spacingY;
    const cols = r + 2;
    const tw   = (cols - 1) * GAP;
    const x0   = W / 2 - tw / 2;
    for (let c = 0; c < cols; c++) rows.push({ x: x0 + c * GAP, y });
  }
  return rows;
}

function getSlotGeometry() {
  const lastCols = ROWS + 1;   // 13 pegs in last row
  const tw  = (lastCols - 1) * GAP;
  const x0  = W / 2 - tw / 2 - GAP / 2;  // half-gap extension on each side
  const sw  = (tw + GAP) / (ROWS + 1);    // 13 slots
  return { x0, sw };
}

// ── INIT MATTER ───────────────────────────────────────────────
function initMatter() {
  engine = Engine.create({ gravity: { y: 1.5 } });
  world  = engine.world;
  runner = Runner.create();

  const W_OPT = { isStatic: true, friction: 0, restitution: 0.1 };
  World.add(world, [
    Bodies.rectangle(W/2, -10, W,  20, W_OPT),
    Bodies.rectangle(W/2, H+10, W, 20, W_OPT),
    Bodies.rectangle(-10, H/2, 20, H,  W_OPT),
    Bodies.rectangle(W+10,H/2, 20, H,  W_OPT),
  ]);

  getPegPositions().forEach(({ x, y }) => {
    const p = Bodies.circle(x, y, PEG_PHYS, {
      isStatic: true, restitution: 0.6, friction: 0, label: 'peg'
    });
    pegs.push(p);
    World.add(world, p);
  });

  Events.on(engine, 'collisionStart', ev => {
    ev.pairs.forEach(pair => {
      const b = balls.find(b => b === pair.bodyA || b === pair.bodyB);
      if (!b || b._landed) return;
      if (b.position.y > SLOT_Y - 24) {
        b._landed = true;
        handleLanding(b);
      }
    });
  });

  Runner.run(runner, engine);
  requestAnimationFrame(renderLoop);
}

// ── SPAWN BALL ────────────────────────────────────────────────
function spawnBall() {
  if (freeDrops <= 0 && balance < currentBet) return false;
  if (freeDrops > 0) {
    freeDrops--;
    document.getElementById('free-drops').textContent = freeDrops;
  } else {
    balance -= currentBet;
  }
  totalDrops++;
  updateUI();

  const ball = Bodies.circle(
    W / 2 + (Math.random() - 0.5) * 18,
    18,
    BALL_PHYS,
    {
      restitution: 0.4,
      friction: 0.005,
      frictionAir: 0.012,
      density: 1.0,
      label: 'ball',
      _landed: false,
      _hue: 20 + Math.random() * 40,
    }
  );
  Body.setVelocity(ball, { x: (Math.random() - 0.5) * 2, y: 5 });
  balls.push(ball);
  World.add(world, ball);

  setTimeout(() => {
    if (!ball._landed) { ball._landed = true; handleLanding(ball); }
  }, 10000);
  return true;
}

// ── LANDING ───────────────────────────────────────────────────
function handleLanding(ball) {
  const { x0, sw } = getSlotGeometry();
  let slot = Math.floor((ball.position.x - x0) / sw);
  slot = Math.max(0, Math.min(MULT.length - 1, slot));

  const mult = MULT[slot];
  const win  = Math.floor(currentBet * mult);
  balance    += win;
  sessionWon += win;
  history.unshift({ mult, win });
  if (history.length > 6) history.pop();

  updateUI();
  renderHistory();
  showToast(mult, win);
  if (win >= currentBet * 5) triggerConfetti();

  setTimeout(() => {
    World.remove(world, ball);
    const i = balls.indexOf(ball);
    if (i > -1) balls.splice(i, 1);

    if (autoRunning) {
      autoTimer = setTimeout(() => {
        if (autoRunning) {
          if (!spawnBall()) stopAuto();
        }
      }, 150 + Math.random() * 200);
    }
  }, 700);
}

// ── MODE / PLAY ───────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById('btn-manual').className = 'mode-btn' + (m === 'manual' ? ' active' : '');
  document.getElementById('btn-auto').className   = 'mode-btn' + (m === 'auto'   ? ' active' : '');
  if (m === 'manual') stopAuto();
  updatePlayBtn();
}

function handlePlay() {
  if (mode === 'manual') {
    spawnBall();
  } else {
    autoRunning ? stopAuto() : startAuto();
  }
}

function startAuto() {
  autoRunning = true;
  document.getElementById('btn-auto').className = 'mode-btn auto-on';
  updatePlayBtn();
  spawnBall();
}

function stopAuto() {
  autoRunning = false;
  clearTimeout(autoTimer);
  document.getElementById('btn-auto').className = 'mode-btn' + (mode === 'auto' ? ' active' : '');
  updatePlayBtn();
}

function updatePlayBtn() {
  const btn = document.getElementById('play-btn');
  if (mode === 'manual') {
    btn.textContent = '⚡ PLAY';
    btn.className   = 'play-btn manual';
  } else if (autoRunning) {
    btn.textContent = '⏹ STOP';
    btn.className   = 'play-btn auto-running';
  } else {
    btn.textContent = '⟳ AUTO START';
    btn.className   = 'play-btn manual';
  }
}

function setBet(amount, el) {
  currentBet = amount;
  document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// ── UI ────────────────────────────────────────────────────────
function updateUI() {
  document.getElementById('balance').textContent    = Math.floor(balance).toLocaleString();
  document.getElementById('won').textContent        = Math.floor(sessionWon).toLocaleString();
  document.getElementById('drop-count').textContent = totalDrops;
}

function showToast(mult, win) {
  const toast  = document.getElementById('toast');
  const multEl = document.getElementById('toast-mult');
  const satsEl = document.getElementById('toast-sats');
  multEl.textContent = mult + 'x';
  multEl.className   = mult >= 5 ? 'toast-mult jackpot-text' : 'toast-mult';
  satsEl.textContent = (win > 0 ? '+' : '') + win.toLocaleString() + ' SATS';
  satsEl.style.color = win < currentBet ? '#ff5f7a' : '#0affee';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 1200);
}

function renderHistory() {
  document.getElementById('history-list').innerHTML = history.slice(0,5).map(h => {
    const cls = h.mult >= 5 ? 'big' : h.mult >= 1 ? 'mid' : 'low';
    return `<div class="history-item">
      <span class="hist-mult ${cls}">${h.mult}x</span>
      <span class="hist-sats">${h.win >= 0?'+':''}${h.win.toLocaleString()}</span>
    </div>`;
  }).join('');
}

function renderLeaderboard() {
  const ranks = ['gold','silver','bronze','',''];
  document.getElementById('leaderboard').innerHTML = LB.map((e,i) =>
    `<div class="lb-item">
      <span class="lb-rank ${ranks[i]}">${i+1}</span>
      <span class="lb-name">${e.name}</span>
      <span class="lb-sats">${(e.sats/1000).toFixed(1)}K</span>
    </div>`
  ).join('');
}

// ── RENDER ────────────────────────────────────────────────────
function renderLoop() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#13131f';
  ctx.fillRect(0, 0, W, H);

  // grid
  ctx.strokeStyle = 'rgba(255,255,255,.018)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 44) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }

  // pegs
  getPegPositions().forEach(({x,y}) => {
    const g = ctx.createRadialGradient(x,y,0,x,y,PEG_R+4);
    g.addColorStop(0,'rgba(220,210,255,.85)');
    g.addColorStop(.5,'rgba(160,140,240,.4)');
    g.addColorStop(1,'rgba(80,60,180,0)');
    ctx.beginPath(); ctx.arc(x,y,PEG_R+4,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,PEG_R,0,Math.PI*2); ctx.fillStyle='#ddd8ff'; ctx.fill();
    ctx.beginPath(); ctx.arc(x-1.5,y-1.5,2.2,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,.7)'; ctx.fill();
  });

  // slots
  const { x0, sw } = getSlotGeometry();
  for (let i = 0; i < MULT.length; i++) {
    const x   = x0 + i * sw;
    const col = SLOT_COL[i];
    const m   = MULT[i];
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x+1, SLOT_Y, sw-2, SLOT_H, 5);
    else ctx.rect(x+1, SLOT_Y, sw-2, SLOT_H);
    ctx.fillStyle   = col + '28';
    ctx.fill();
    ctx.strokeStyle = col;
    ctx.lineWidth   = 1.5;
    ctx.stroke();
    const label = m >= 10 ? m.toFixed(0)+'x' : m+'x';
    ctx.fillStyle   = col;
    ctx.font        = `bold ${sw > 26 ? 9 : 7}px Orbitron,monospace`;
    ctx.textAlign   = 'center';
    ctx.fillText(label, x + sw/2, SLOT_Y + 14);
    ctx.beginPath(); ctx.arc(x+sw/2, SLOT_Y+30, 7, 0, Math.PI*2);
    ctx.fillStyle = col+'44'; ctx.fill();
    ctx.strokeStyle = col; ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = col; ctx.font = 'bold 7px Arial';
    ctx.fillText('₿', x+sw/2, SLOT_Y+33);
  }

  // balls
  balls.forEach(ball => {
    const {x,y} = ball.position;
    const h     = ball._hue || 30;
    const sg = ctx.createRadialGradient(x,y,0,x,y,BALL_R+8);
    sg.addColorStop(0, `hsla(${h},100%,60%,.55)`);
    sg.addColorStop(1, `hsla(${h},100%,60%,0)`);
    ctx.beginPath(); ctx.arc(x,y,BALL_R+8,0,Math.PI*2); ctx.fillStyle=sg; ctx.fill();
    const bg = ctx.createRadialGradient(x-3,y-3,1,x,y,BALL_R);
    bg.addColorStop(0,   '#ffffff');
    bg.addColorStop(.25, `hsl(${h},100%,75%)`);
    bg.addColorStop(.7,  `hsl(${h},100%,50%)`);
    bg.addColorStop(1,   `hsl(${h-20},90%,25%)`);
    ctx.beginPath(); ctx.arc(x,y,BALL_R,0,Math.PI*2);
    ctx.fillStyle=bg; ctx.fill();
    ctx.strokeStyle=`hsla(${h},80%,85%,.5)`; ctx.lineWidth=1.5; ctx.stroke();
  });

  requestAnimationFrame(renderLoop);
}

// ── CONFETTI ──────────────────────────────────────────────────
function triggerConfetti() {
  const pc   = document.getElementById('particle-canvas');
  const pctx = pc.getContext('2d');
  pc.style.display = 'block';
  pc.width  = window.innerWidth;
  pc.height = window.innerHeight;
  const cols = ['#ff6b00','#ffc700','#0affee','#ff2d55','#4cd964','#c084fc'];
  const pts  = Array.from({length:100}, () => ({
    x:Math.random()*pc.width, y:Math.random()*pc.height-pc.height,
    vx:(Math.random()-.5)*7, vy:Math.random()*4+2,
    r:Math.random()*5+3, col:cols[Math.floor(Math.random()*cols.length)],
    rot:Math.random()*Math.PI*2, rv:(Math.random()-.5)*.2
  }));
  let f=0;
  (function anim(){
    if(++f>100){pc.style.display='none';return}
    pctx.clearRect(0,0,pc.width,pc.height);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.rot+=p.rv;
      pctx.save();pctx.translate(p.x,p.y);pctx.rotate(p.rot);
      pctx.fillStyle=p.col;pctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*2);pctx.restore();
    });
    requestAnimationFrame(anim);
  })();
}
